# Fly.io deployment: one small always-on machine + a persistent volume for state.db.
#
#   fly launch --no-deploy          # create the app (edit app name below first)
#   fly volumes create cmb_data --size 1 --region <region>
#   fly secrets set ALPACA_API_KEY=... ALPACA_SECRET_KEY=... \
#       ALPACA_BASE_URL=https://paper-api.alpaca.markets \
#       FMP_API_KEY=... SLACK_WEBHOOK_URL=... DRY_RUN=true
#   fly deploy
#
# Flip DRY_RUN to false (fly secrets set DRY_RUN=false) only after a clean dry-run.

app = "congress-mirror-bot"
primary_region = "iad"   # US East — close to US market hours / data.

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "cmb_data"
  destination = "/data"

[env]
  STATE_DB_PATH = "/data/state.db"

# Always-on single machine (the in-process scheduler must stay running).
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[experimental]
  auto_stop_machines = false
  min_machines_running = 1
